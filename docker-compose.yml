services:
  app:
    build: ./backend
    container_name: nlp4re_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs
      - ./backend/app:/app/app
    environment:
      - POSTGRES_HOST=pgvector
      - DOCS_DIR=/app/docs
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgvector_data:
